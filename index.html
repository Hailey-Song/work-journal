<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>업무 일지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg2: #f8f7f5;
    --bg3: #f1efec;
    --text: #37352f;
    --text2: #787672;
    --text3: #b0adab;
    --border: #e5e3df;
    --green: #1D9E75;
    --amber: #BA7517;
    --red: #A32D2D;
    --blue: #2eaadc;
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  input, textarea, select, button { font-family: inherit; outline: none; }
  ::placeholder { color: var(--text3); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* topbar */
  .topbar { position: sticky; top: 0; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 13px 18px; }
  .topbar-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .sync-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .sync-dot.syncing { background: var(--amber); animation: pulse 1s infinite; }
  .sync-dot.err { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
  .btn-top { border: 1px solid var(--border); border-radius: 7px; padding: 5px 12px; font-size: 12px; cursor: pointer; background: transparent; color: var(--text2); }
  .btn-top:hover { background: var(--bg2); }

  /* layout */
  .main { max-width: 640px; margin: 0 auto; padding: 24px 18px 110px; }

  /* date nav */
  .date-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .date-nav-btn { background: none; border: none; cursor: pointer; color: var(--text2); font-size: 22px; line-height: 1; padding: 0 4px; }
  .date-str { font-size: 20px; font-weight: 700; flex: 1; letter-spacing: -0.4px; }

  /* stat cards */
  .stat-row { display: flex; gap: 10px; margin-bottom: 22px; }
  .stat-card { background: var(--bg2); border-radius: 10px; padding: 12px 16px; flex: 1; }
  .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .stat-val { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .stat-sub { font-size: 11px; color: var(--text2); margin-top: 3px; }

  /* section */
  .section { margin-bottom: 26px; }
  .sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .sec-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
  .sec-add { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--text2); }
  .sec-add:hover { color: var(--text); }

  /* items */
  .item-row { display: flex; align-items: flex-start; gap: 9px; padding: 7px 0; border-bottom: 1px solid var(--bg3); position: relative; }
  .item-row:hover .del-btn { opacity: 1; }
  .chk { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border); background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 3px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .chk.done { background: var(--green); border-color: var(--green); }
  .item-text { flex: 1; border: none; background: transparent; font-size: 15px; color: var(--text); padding: 0; line-height: 1.5; }
  .item-text.done { text-decoration: line-through; color: var(--text3); }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 15px; padding: 0 2px; opacity: 0; transition: opacity .1s; flex-shrink: 0; line-height: 1; }
  .proj-sel { border: none; background: transparent; font-size: 11px; color: var(--text2); cursor: pointer; max-width: 90px; }
  .proj-tag { background: var(--bg3); color: var(--text2); border-radius: 4px; padding: 1px 7px; font-size: 11px; white-space: nowrap; align-self: center; }
  .time-hint { font-size: 11px; color: var(--text3); margin-top: 1px; }

  /* textarea */
  textarea.notes { border: none; background: transparent; font-size: 15px; color: var(--text); width: 100%; min-height: 80px; resize: vertical; line-height: 1.7; padding: 0; }

  /* rate rows */
  .rate-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--bg3); }
  .proj-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }
  .rate-input { width: 58px; border: 1px solid var(--border); border-radius: 7px; padding: 5px 8px; font-size: 14px; text-align: right; color: var(--text); background: var(--bg); }
  .rate-bar-bg { width: 72px; height: 4px; border-radius: 2px; background: var(--bg3); overflow: hidden; }
  .rate-bar-fill { height: 100%; border-radius: 2px; background: var(--blue); transition: width .3s; }

  /* ai buttons */
  .ai-btns { display: flex; gap: 10px; margin-top: 28px; flex-wrap: wrap; }
  .ai-btn { flex: 1; border: none; border-radius: 9px; padding: 12px 16px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: opacity .15s, transform .1s; min-width: 130px; }
  .ai-btn:active { transform: scale(.98); }
  .ai-btn:disabled { opacity: .6; cursor: not-allowed; }
  .ai-btn.dark { background: var(--text); color: var(--bg); }
  .ai-btn.teal { background: var(--green); color: #fff; }

  /* alert */
  .alert-box { background: #fffbeb; border: 1px solid #f6ab3c44; border-radius: 9px; padding: 13px 16px; margin-bottom: 18px; }
  .alert-title { font-size: 13px; font-weight: 600; color: #c57b1a; margin-bottom: 5px; }
  .alert-btns { display: flex; gap: 8px; margin-top: 10px; }
  .btn-warn { background: #f6ab3c; color: #fff; border: none; border-radius: 7px; padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-ghost { background: none; border: 1px solid var(--border); border-radius: 7px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--text2); }

  /* bottom tabbar */
  .tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); display: flex; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
  .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0 11px; cursor: pointer; border: none; background: transparent; color: var(--text2); transition: color .15s; }
  .tab-btn.active { color: var(--green); }
  .tab-icon { font-size: 22px; line-height: 1; }
  .tab-label { font-size: 10px; font-weight: 500; }

  /* toast */
  .toast { position: fixed; bottom: 76px; left: 50%; transform: translateX(-50%); border-radius: 9px; padding: 10px 20px; font-size: 13px; font-weight: 600; z-index: 200; white-space: nowrap; pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,.12); transition: opacity .3s; }
  .toast.ok { background: var(--text); color: var(--bg); }
  .toast.warn { background: var(--amber); color: #fff; }
  .toast.err { background: var(--red); color: #fff; }

  /* projects page */
  .proj-list-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--bg3); }
  .proj-name { flex: 1; font-size: 15px; }
  .proj-add-row { display: flex; gap: 8px; margin-top: 16px; }
  .proj-add-input { flex: 1; border: 1px solid var(--border); border-radius: 9px; padding: 10px 14px; font-size: 15px; color: var(--text); background: var(--bg); }
  .btn-primary { background: var(--text); color: var(--bg); border: none; border-radius: 9px; padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer; }

  /* history */
  .hist-card { border: 1px solid var(--border); border-radius: 11px; padding: 14px 16px; margin-bottom: 11px; cursor: pointer; transition: background .1s; }
  .hist-card:hover { background: var(--bg2); }
  .hist-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .hist-date { font-size: 14px; font-weight: 600; }
  .hist-meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--text2); }
  .mini-tag { background: var(--bg3); color: var(--text2); border-radius: 4px; padding: 1px 7px; font-size: 11px; }

  /* page */
  .page { display: none; }
  .page.active { display: block; }

  /* sync time */
  .sync-time { font-size: 11px; color: var(--text3); margin-bottom: 14px; }

  /* empty */
  .empty-hint { font-size: 13px; color: var(--text3); padding: 7px 0; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">📋 업무 일지</span>
  <div class="topbar-right">
    <span class="sync-badge"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">준비</span></span>
    <button class="btn-top" onclick="syncToSheets()">☁ 저장</button>
  </div>
</div>

<div class="main">
  <!-- TODAY -->
  <div class="page active" id="page-today">
    <div class="date-nav">
      <button class="date-nav-btn" onclick="moveDate(-1)">‹</button>
      <span class="date-str" id="date-str"></span>
      <button class="date-nav-btn" onclick="moveDate(1)">›</button>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-label">실행률</div><div class="stat-val" id="exec-val">0%</div><div class="stat-sub" id="exec-sub">0/0 완료</div></div>
      <div class="stat-card"><div class="stat-label">투입율 합계</div><div class="stat-val" id="rate-val">0%</div><div class="stat-sub" id="rate-sub">미입력</div></div>
    </div>
    <div class="sync-time" id="sync-time"></div>
    <div id="new-proj-alert" style="display:none" class="alert-box">
      <div class="alert-title">🆕 신규 프로젝트 감지됨</div>
      <div id="new-proj-names" style="font-size:13px;color:var(--text)"></div>
      <div class="alert-btns">
        <button class="btn-warn" onclick="acceptNewProjects()">추가</button>
        <button class="btn-ghost" onclick="dismissNewProj()">무시</button>
      </div>
    </div>

    <!-- 오늘 할 일 -->
    <div class="section">
      <div class="sec-head"><span class="sec-title">📌 오늘 할 일</span><button class="sec-add" onclick="addTodo()">+ 추가</button></div>
      <div id="todos-list"></div>
    </div>

    <!-- 수시 체크 -->
    <div class="section">
      <div class="sec-head"><span class="sec-title">⚡ 수시 체크</span><button class="sec-add" onclick="addCheck()">+ 추가</button></div>
      <div id="checks-list"></div>
    </div>

    <!-- 실제 업무 기록 -->
    <div class="section">
      <div class="sec-head"><span class="sec-title">📝 실제 업무 기록</span></div>
      <textarea class="notes" id="actual-notes" placeholder="오늘 실제로 한 업무를 자유롭게 기록하세요..." oninput="onActualChange(this.value)"></textarea>
    </div>

    <!-- 팔로우업 -->
    <div class="section">
      <div class="sec-head"><span class="sec-title">🔁 팔로우업</span><button class="sec-add" onclick="addFollowup()">+ 추가</button></div>
      <div id="followups-list"></div>
    </div>

    <!-- 투입율 -->
    <div class="section">
      <div class="sec-head"><span class="sec-title">⏱ 프로젝트별 투입율</span></div>
      <div id="rates-list"></div>
      <div id="rate-total-row" style="text-align:right;padding-top:7px;font-size:12px;font-weight:700;display:none"></div>
    </div>

    <div class="ai-btns">
      <button class="ai-btn dark" id="classify-btn" onclick="handleClassify()">🤖 AI 자동 분류</button>
      <button class="ai-btn teal" id="ai-todo-btn" onclick="handleAiTodos()">✨ 내일 투두 생성</button>
    </div>
  </div>

  <!-- PROJECTS -->
  <div class="page" id="page-projects">
    <h2 style="font-size:20px;font-weight:700;margin-bottom:18px;letter-spacing:-0.4px">📁 프로젝트</h2>
    <div id="proj-list"></div>
    <div class="proj-add-row">
      <input class="proj-add-input" id="proj-input" placeholder="새 프로젝트 이름" onkeydown="if(event.key==='Enter')addProject()">
      <button class="btn-primary" onclick="addProject()">추가</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="page" id="page-history">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 style="font-size:20px;font-weight:700;letter-spacing:-0.4px">🗂 히스토리</h2>
      <button class="btn-top" onclick="loadFromSheets()">☁ 불러오기</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<!-- TABBAR -->
<div class="tabbar">
  <button class="tab-btn active" id="tab-today" onclick="setPage('today')"><span class="tab-icon">📝</span><span class="tab-label">오늘</span></button>
  <button class="tab-btn" id="tab-projects" onclick="setPage('projects')"><span class="tab-icon">📁</span><span class="tab-label">프로젝트</span></button>
  <button class="tab-btn" id="tab-history" onclick="setPage('history')"><span class="tab-icon">🗂</span><span class="tab-label">히스토리</span></button>
</div>

<div class="toast" id="toast" style="display:none"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SHEET_ID  = '1GnTK_5mNRd2fXZuADal9uTZ_lwbNLbTeCuqlt4m52Es';
const API_KEY   = 'AIzaSyBcgzZ9hluqanfRjmQOM-P6PRWPDqOrnT8';
const SHEET_NM  = 'Sheet1';
const BASE_URL  = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values`;
const STORE     = 'wj_v5';

// ── HELPERS ──────────────────────────────────────────────────────────────────
const pad  = n => String(n).padStart(2,'0');
const fmt  = d => { const dt=d?new Date(d):new Date(); return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`; };
const fmtKr = s => { const d=new Date(s); const w=['일','월','화','수','목','금','토']; return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${w[d.getDay()]})`; };
const uid  = () => Math.random().toString(36).slice(2,9);
const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const todayStr = fmt();

// ── STATE ────────────────────────────────────────────────────────────────────
let S = { entries:{}, projects:[], page:'today', date:todayStr, newProjAlert:[], lastSync:'' };

function loadLocal() {
  try { const r=localStorage.getItem(STORE); if(r){const p=JSON.parse(r);S.entries=p.entries||{};S.projects=p.projects||[];S.lastSync=p.lastSync||'';} } catch{}
}
function saveLocal() {
  try { localStorage.setItem(STORE,JSON.stringify({entries:S.entries,projects:S.projects,lastSync:S.lastSync})); } catch{}
}
function getEntry(date) {
  return S.entries[date]||{date,todos:[{id:uid(),text:'',done:false,project:''}],checks:[],followups:[],actual:'',inputRates:{}};
}
function setEntry(date,patch) {
  S.entries[date]={...getEntry(date),...patch}; saveLocal();
}

// ── PAGES ────────────────────────────────────────────────────────────────────
function setPage(p) {
  S.page=p;
  ['today','projects','history'].forEach(n=>{
    document.getElementById('page-'+n).classList.toggle('active',n===p);
    document.getElementById('tab-'+n).classList.toggle('active',n===p);
  });
  if(p==='today') renderToday();
  if(p==='projects') renderProjects();
  if(p==='history') renderHistory();
}

// ── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg,type='ok') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type; t.style.display='block';
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.style.display='none',2800);
}

// ── SYNC STATUS ──────────────────────────────────────────────────────────────
function setSyncStatus(s) {
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-text');
  dot.className='sync-dot'+(s==='syncing'?' syncing':s==='err'?' err':'');
  txt.textContent=s==='syncing'?'저장 중...':s==='err'?'실패':s==='ok'?'저장됨':'준비';
}

// ── RENDER TODAY ─────────────────────────────────────────────────────────────
function renderToday() {
  const e = getEntry(S.date);

  document.getElementById('date-str').textContent = fmtKr(S.date);
  document.getElementById('sync-time').textContent = S.lastSync ? '마지막 저장: '+S.lastSync : '';

  // stats
  const valid=e.todos.filter(t=>t.text.trim());
  const done=valid.filter(t=>t.done);
  const exec=valid.length?Math.round(done.length/valid.length*100):0;
  const execEl=document.getElementById('exec-val');
  execEl.textContent=exec+'%';
  execEl.style.color=exec>=80?'var(--green)':exec>=50?'var(--amber)':'var(--red)';
  document.getElementById('exec-sub').textContent=`${done.length}/${valid.length} 완료`;

  const rateTotal=Object.values(e.inputRates||{}).reduce((s,v)=>s+(Number(v)||0),0);
  const rateEl=document.getElementById('rate-val');
  rateEl.textContent=rateTotal+'%';
  rateEl.style.color=Math.abs(rateTotal-100)<0.1?'var(--green)':rateTotal>100?'var(--red)':'var(--text)';
  document.getElementById('rate-sub').textContent=Math.abs(rateTotal-100)<0.1?'✓ 합계 100%':rateTotal===0?'미입력':`${100-rateTotal}% 남음`;

  // new proj alert
  const alertEl=document.getElementById('new-proj-alert');
  if(S.newProjAlert.length) {
    alertEl.style.display='block';
    document.getElementById('new-proj-names').innerHTML=`<b>${S.newProjAlert.join(', ')}</b> — 목록에 추가할까요?`;
  } else alertEl.style.display='none';

  // todos
  const tl=document.getElementById('todos-list'); tl.innerHTML='';
  e.todos.forEach((t,i)=>{
    const d=document.createElement('div'); d.className='item-row';
    d.innerHTML=`
      <div class="chk${t.done?' done':''}" onclick="toggleTodo('${t.id}')">${t.done?checkSvg():''}</div>
      <input class="item-text${t.done?' done':''}" value="${esc(t.text)}" placeholder="할 일 입력..."
        onchange="updateTodoText('${t.id}',this.value)"
        onkeydown="todoKey(event,'${t.id}',${i})">
      ${t.project?`<span class="proj-tag">${esc(t.project)}</span>`:''}
      ${projSelect('todo',t.id,t.project)}
      <button class="del-btn" onclick="removeTodo('${t.id}')">✕</button>`;
    tl.appendChild(d);
  });

  // checks
  const cl=document.getElementById('checks-list'); cl.innerHTML='';
  if(!e.checks.length) cl.innerHTML='<div class="empty-hint">중간에 확인할 사항을 기록하세요</div>';
  e.checks.forEach(c=>{
    const d=document.createElement('div'); d.className='item-row';
    d.innerHTML=`
      <div class="chk${c.done?' done':''}" onclick="toggleCheck('${c.id}')">${c.done?checkSvg():''}</div>
      <div style="flex:1">
        <input class="item-text${c.done?' done':''}" value="${esc(c.text)}" placeholder="체크 사항..." onchange="updateCheckText('${c.id}',this.value)">
        <div class="time-hint">${c.time||''}</div>
      </div>
      ${c.project?`<span class="proj-tag">${esc(c.project)}</span>`:''}
      ${projSelect('check',c.id,c.project)}
      <button class="del-btn" onclick="removeCheck('${c.id}')">✕</button>`;
    cl.appendChild(d);
  });

  // actual
  document.getElementById('actual-notes').value = e.actual||'';

  // followups
  const fl=document.getElementById('followups-list'); fl.innerHTML='';
  if(!e.followups.length) fl.innerHTML='<div class="empty-hint">팔로우업이 필요한 사항을 기록하세요</div>';
  e.followups.forEach(f=>{
    const d=document.createElement('div'); d.className='item-row';
    d.innerHTML=`
      <div class="chk${f.done?' done':''}" onclick="toggleFollowup('${f.id}')">${f.done?checkSvg():''}</div>
      <div style="flex:1">
        <input class="item-text${f.done?' done':''}" value="${esc(f.text)}" placeholder="팔로우업 내용..." onchange="updateFollowupText('${f.id}',this.value)">
        <input type="date" value="${f.dueDate||''}" onchange="updateFollowupDate('${f.id}',this.value)"
          style="border:none;background:transparent;font-size:11px;color:var(--text2);cursor:pointer;margin-top:1px">
      </div>
      ${f.project?`<span class="proj-tag">${esc(f.project)}</span>`:''}
      ${projSelect('followup',f.id,f.project)}
      <button class="del-btn" onclick="removeFollowup('${f.id}')">✕</button>`;
    fl.appendChild(d);
  });

  // rates
  const rl=document.getElementById('rates-list'); rl.innerHTML='';
  const tr=document.getElementById('rate-total-row');
  if(!S.projects.length) { rl.innerHTML='<div class="empty-hint">프로젝트 탭에서 먼저 추가하세요</div>'; tr.style.display='none'; return; }
  S.projects.forEach(p=>{
    const val=e.inputRates?.[p]||'';
    const row=document.createElement('div'); row.className='rate-row';
    row.innerHTML=`
      <div class="proj-dot"></div>
      <span style="flex:1;font-size:14px">${esc(p)}</span>
      <input type="number" min="0" max="100" value="${val}" placeholder="0" class="rate-input"
        onchange="updateRate('${esc(p)}',this.value)">
      <span style="font-size:13px;color:var(--text2)">%</span>
      <div class="rate-bar-bg"><div class="rate-bar-fill" style="width:${Math.min(Number(val)||0,100)}%"></div></div>`;
    rl.appendChild(row);
  });
  tr.style.display='block';
  tr.style.color=Math.abs(rateTotal-100)<0.1?'var(--green)':rateTotal>100?'var(--red)':'var(--text2)';
  tr.textContent=`합계: ${rateTotal}%${Math.abs(rateTotal-100)<0.1?' ✓':''}`;
}

function checkSvg() { return '<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>'; }

function projSelect(kind, id, cur) {
  const opts = S.projects.map(p=>`<option value="${esc(p)}"${cur===p?' selected':''}>${esc(p)}</option>`).join('');
  return `<select class="proj-select" onchange="updateProj('${kind}','${id}',this.value)"><option value="">프로젝트</option>${opts}</select>`;
}

// ── RENDER PROJECTS ──────────────────────────────────────────────────────────
function renderProjects() {
  const pl=document.getElementById('proj-list'); pl.innerHTML='';
  if(!S.projects.length) { pl.innerHTML='<div class="empty-hint" style="margin-bottom:12px">프로젝트를 추가하세요</div>'; return; }
  S.projects.forEach((p,i)=>{
    const row=document.createElement('div'); row.className='proj-list-item';
    row.innerHTML=`<div class="proj-dot" style="background:var(--blue)"></div><span class="proj-name">${esc(p)}</span><button class="del-btn" style="opacity:1" onclick="removeProject(${i})">✕</button>`;
    pl.appendChild(row);
  });
}

// ── RENDER HISTORY ───────────────────────────────────────────────────────────
function renderHistory() {
  const hl=document.getElementById('history-list'); hl.innerHTML='';
  const dates=Object.keys(S.entries).sort().reverse();
  if(!dates.length) { hl.innerHTML='<div class="empty-hint">아직 기록이 없어요</div>'; return; }
  dates.forEach(d=>{
    const e=S.entries[d];
    const tot=(e.todos||[]).filter(t=>t.text.trim()).length;
    const don=(e.todos||[]).filter(t=>t.done&&t.text.trim()).length;
    const rate=tot>0?Math.round(don/tot*100):null;
    const rc=rate===null?'var(--text2)':rate>=80?'var(--green)':rate>=50?'var(--amber)':'var(--red)';
    const projRates=Object.entries(e.inputRates||{}).filter(([,v])=>v);
    const card=document.createElement('div'); card.className='hist-card';
    card.onclick=()=>{S.date=d;setPage('today');};
    card.innerHTML=`
      <div class="hist-head">
        <span class="hist-date">${fmtKr(d)}</span>
        ${rate!==null?`<span style="font-size:12px;font-weight:700;color:${rc}">실행률 ${rate}%</span>`:''}
      </div>
      <div class="hist-meta">
        <span>✅ ${don}/${tot} 완료</span>
        ${(e.checks||[]).filter(c=>c.text.trim()).length?`<span>⚡ 수시체크 ${(e.checks||[]).filter(c=>c.text.trim()).length}건</span>`:''}
        ${(e.followups||[]).filter(f=>f.text.trim()).length?`<span>🔁 팔로우업 ${(e.followups||[]).filter(f=>f.text.trim()).length}건</span>`:''}
        ${projRates.map(([p,v])=>`<span class="mini-tag">${esc(p)} ${v}%</span>`).join('')}
      </div>`;
    hl.appendChild(card);
  });
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function moveDate(dir) { const d=new Date(S.date); d.setDate(d.getDate()+dir); S.date=fmt(d); renderToday(); }

// todo
function addTodo() { const e=getEntry(S.date); setEntry(S.date,{todos:[...e.todos,{id:uid(),text:'',done:false,project:''}]}); renderToday(); }
function toggleTodo(id) { const e=getEntry(S.date); setEntry(S.date,{todos:e.todos.map(t=>t.id===id?{...t,done:!t.done}:t)}); renderToday(); }
function updateTodoText(id,v) { const e=getEntry(S.date); setEntry(S.date,{todos:e.todos.map(t=>t.id===id?{...t,text:v}:t)}); }
function removeTodo(id) { const e=getEntry(S.date); const ts=e.todos.filter(t=>t.id!==id); setEntry(S.date,{todos:ts.length?ts:[{id:uid(),text:'',done:false,project:''}]}); renderToday(); }
function todoKey(ev,id,idx) { if(ev.key==='Enter'){ev.preventDefault();addTodo();} if(ev.key==='Backspace'){const e=getEntry(S.date);const t=e.todos.find(t=>t.id===id);if(t&&!t.text&&e.todos.length>1)removeTodo(id);} }

// check
function addCheck() { const e=getEntry(S.date); const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); setEntry(S.date,{checks:[...(e.checks||[]),{id:uid(),text:'',done:false,project:'',time:now}]}); renderToday(); }
function toggleCheck(id) { const e=getEntry(S.date); setEntry(S.date,{checks:e.checks.map(c=>c.id===id?{...c,done:!c.done}:c)}); renderToday(); }
function updateCheckText(id,v) { const e=getEntry(S.date); setEntry(S.date,{checks:e.checks.map(c=>c.id===id?{...c,text:v}:c)}); }
function removeCheck(id) { const e=getEntry(S.date); setEntry(S.date,{checks:e.checks.filter(c=>c.id!==id)}); renderToday(); }

// followup
function addFollowup() { const e=getEntry(S.date); setEntry(S.date,{followups:[...(e.followups||[]),{id:uid(),text:'',done:false,dueDate:'',project:''}]}); renderToday(); }
function toggleFollowup(id) { const e=getEntry(S.date); setEntry(S.date,{followups:e.followups.map(f=>f.id===id?{...f,done:!f.done}:f)}); renderToday(); }
function updateFollowupText(id,v) { const e=getEntry(S.date); setEntry(S.date,{followups:e.followups.map(f=>f.id===id?{...f,text:v}:f)}); }
function updateFollowupDate(id,v) { const e=getEntry(S.date); setEntry(S.date,{followups:e.followups.map(f=>f.id===id?{...f,dueDate:v}:f)}); }
function removeFollowup(id) { const e=getEntry(S.date); setEntry(S.date,{followups:e.followups.filter(f=>f.id!==id)}); renderToday(); }

// actual
function onActualChange(v) { setEntry(S.date,{actual:v}); }

// proj select - renderToday 없이 데이터만 저장 (입력 내용 날아가지 않게)
function updateProj(kind,id,val) {
  const e=getEntry(S.date);
  if(kind==='todo') setEntry(S.date,{todos:e.todos.map(t=>t.id===id?{...t,project:val}:t)});
  else if(kind==='check') setEntry(S.date,{checks:e.checks.map(c=>c.id===id?{...c,project:val}:c)});
  else if(kind==='followup') setEntry(S.date,{followups:e.followups.map(f=>f.id===id?{...f,project:val}:f)});
  // proj-tag 텍스트만 업데이트 (전체 리렌더 X)
  const sel = document.querySelector('select[onchange*="'+id+'"]');
  if(sel) {
    const row = sel.closest('.item-row');
    if(row) {
      let tag = row.querySelector('.proj-tag');
      if(val) { if(tag) tag.textContent=val; else { tag=document.createElement('span'); tag.className='proj-tag'; tag.textContent=val; sel.before(tag); } }
      else { if(tag) tag.remove(); }
    }
  }
  // 통계 갱신
  updateStats();
}
function updateStats() {
  const e=getEntry(S.date);
  const valid=e.todos.filter(t=>t.text.trim());
  const done=valid.filter(t=>t.done);
  const exec=valid.length?Math.round(done.length/valid.length*100):0;
  const execEl=document.getElementById('exec-val');
  if(execEl){execEl.textContent=exec+'%';execEl.style.color=exec>=80?'var(--green)':exec>=50?'var(--amber)":'var(--red)';}
  const sub=document.getElementById('exec-sub'); if(sub) sub.textContent=done.length+'/'+valid.length+' 완료';
}

// rate
function updateRate(p,v) { const e=getEntry(S.date); setEntry(S.date,{inputRates:{...e.inputRates,[p]:v}}); renderToday(); }

// projects
function addProject() { const inp=document.getElementById('proj-input'); const n=inp.value.trim(); if(!n||S.projects.includes(n)) return; S.projects.push(n); inp.value=''; saveLocal(); renderProjects(); }
function removeProject(i) { S.projects.splice(i,1); saveLocal(); renderProjects(); }
function acceptNewProjects() { S.newProjAlert.forEach(p=>{if(!S.projects.includes(p))S.projects.push(p);}); showToast('프로젝트 추가됐어요!'); S.newProjAlert=[]; saveLocal(); renderToday(); }
function dismissNewProj() { S.newProjAlert=[]; renderToday(); }

// ── GOOGLE SHEETS ────────────────────────────────────────────────────────────
async function syncToSheets() {
  setSyncStatus('syncing');
  try {
    const rows=[['날짜','구분','프로젝트','내용','완료','기한','실행률','투입율','저장시각']];
    const now=new Date().toLocaleString('ko-KR');
    Object.entries(S.entries).sort().forEach(([d,e])=>{
      const tot=(e.todos||[]).filter(t=>t.text.trim()).length;
      const don=(e.todos||[]).filter(t=>t.done&&t.text.trim()).length;
      const rate=tot>0?Math.round(don/tot*100)+'%':'-';
      (e.todos||[]).filter(t=>t.text.trim()).forEach(t=>rows.push([d,'투두',t.project||'미분류',t.text,t.done?'완료':'미완','',rate,'',now]));
      (e.checks||[]).filter(c=>c.text.trim()).forEach(c=>rows.push([d,'수시체크',c.project||'미분류',c.text,c.done?'완료':'미완','','','',now]));
      (e.followups||[]).filter(f=>f.text.trim()).forEach(f=>rows.push([d,'팔로우업',f.project||'미분류',f.text,f.done?'완료':'미완',f.dueDate||'','','',now]));
      if(e.actual?.trim()) rows.push([d,'실제업무','',e.actual,'','','','',now]);
      Object.entries(e.inputRates||{}).filter(([,v])=>v).forEach(([p,v])=>rows.push([d,'투입율',p,'','','','',v+'%',now]));
    });
    await fetch(`${BASE_URL}/${SHEET_NM}:clear?key=${API_KEY}`,{method:'POST',headers:{'Content-Type':'application/json'}});
    await fetch(`${BASE_URL}/${SHEET_NM}?valueInputOption=RAW&key=${API_KEY}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({range:SHEET_NM,majorDimension:'ROWS',values:rows})});
    S.lastSync=new Date().toLocaleString('ko-KR'); saveLocal();
    setSyncStatus('ok'); showToast('구글 시트에 저장됐어요!');
    document.getElementById('sync-time').textContent='마지막 저장: '+S.lastSync;
  } catch { setSyncStatus('err'); showToast('저장 실패. 다시 시도해주세요','err'); }
}

async function loadFromSheets() {
  setSyncStatus('syncing');
  try {
    const res=await fetch(`${BASE_URL}/${SHEET_NM}?key=${API_KEY}`);
    const d=await res.json();
    const rows=d.values||[];
    if(rows.length<2){setSyncStatus('ok');showToast('시트에 데이터가 없어요','warn');return;}
    const entries={};
    rows.slice(1).forEach(r=>{
      const [date,type,proj,content,done,,,,] = r;
      if(!date||!type) return;
      if(!entries[date]) entries[date]={date,todos:[],checks:[],followups:[],actual:'',inputRates:{}};
      const e=entries[date];
      const p=proj==='미분류'?'':proj||'';
      if(type==='투두') e.todos.push({id:uid(),text:content||'',done:done==='완료',project:p});
      else if(type==='수시체크') e.checks.push({id:uid(),text:content||'',done:done==='완료',project:p,time:''});
      else if(type==='팔로우업') e.followups.push({id:uid(),text:content||'',done:done==='완료',dueDate:r[5]||'',project:p});
      else if(type==='실제업무') e.actual=content||'';
      else if(type==='투입율') e.inputRates[proj]=(r[7]||'').replace('%','');
    });
    S.entries={...S.entries,...entries}; saveLocal();
    setSyncStatus('ok'); showToast('시트에서 불러왔어요!'); renderHistory();
  } catch { setSyncStatus('err'); showToast('불러오기 실패','err'); }
}

// ── AI ────────────────────────────────────────────────────────────────────────
async function handleClassify() {
  const e=getEntry(S.date);
  const items=[...(e.todos||[]).filter(t=>t.text.trim()).map(t=>({id:t.id,text:t.text})),...(e.checks||[]).filter(c=>c.text.trim()).map(c=>({id:c.id,text:c.text})),...(e.followups||[]).filter(f=>f.text.trim()).map(f=>({id:f.id,text:f.text}))];
  if(!items.length){showToast('분류할 항목이 없어요','warn');return;}
  const btn=document.getElementById('classify-btn'); btn.disabled=true; btn.textContent='⏳ 분류 중...';
  try {
    const prompt=`업무 항목들을 기존 프로젝트에 분류해주세요.\n기존 프로젝트: ${S.projects.length?S.projects.join(', '):'(없음)'}\n항목:\n${items.map(i=>`[${i.id}] ${i.text}`).join('\n')}\n새 프로젝트가 필요하면 new_projects에 추가.\nJSON만 출력:\n{"classified":[{"id":"id","project":"프로젝트명"}],"new_projects":["신규"]}`;
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=(data.content||[]).map(c=>c.text||'').join('').replace(/```json[\s\S]*?```|```/g,'').trim();
    const result=JSON.parse(text);
    const map=Object.fromEntries(result.classified.map(c=>[c.id,c.project]));
    const fresh=getEntry(S.date);
    setEntry(S.date,{todos:(fresh.todos||[]).map(t=>({...t,project:map[t.id]??t.project})),checks:(fresh.checks||[]).map(c=>({...c,project:map[c.id]??c.project})),followups:(fresh.followups||[]).map(f=>({...f,project:map[f.id]??f.project}))});
    const newP=(result.new_projects||[]).filter(p=>!S.projects.includes(p));
    if(newP.length) S.newProjAlert=newP; else showToast('분류 완료!');
    renderToday();
  } catch { showToast('분류 실패','err'); }
  btn.disabled=false; btn.textContent='🤖 AI 자동 분류';
}

async function handleAiTodos() {
  const e=getEntry(S.date);
  const btn=document.getElementById('ai-todo-btn'); btn.disabled=true; btn.textContent='⏳ 생성 중...';
  try {
    const prompt=`오늘 업무를 분석해 내일 TODO를 5개 이내로 추천해주세요.\n오늘(${S.date}):\n${(e.todos||[]).filter(t=>t.text.trim()).map((t,i)=>`${i+1}.[${t.done?'완료':'미완'}]${t.text}(${t.project||'미분류'})`).join(' ')||'없음'}\n실제업무: ${e.actual||'없음'}\n팔로우업: ${(e.followups||[]).filter(f=>f.text.trim()).map(f=>f.text).join(', ')||'없음'}\nJSON만 출력: {"todos":[{"text":"할일","project":"프로젝트명"}]}`;
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=(data.content||[]).map(c=>c.text||'').join('').replace(/```json[\s\S]*?```|```/g,'').trim();
    const result=JSON.parse(text);
    const nd=new Date(S.date); nd.setDate(nd.getDate()+1);
    const nextDate=fmt(nd);
    const next=getEntry(nextDate);
    setEntry(nextDate,{...next,todos:result.todos.map(t=>({id:uid(),text:t.text,done:false,project:t.project||''}))});
    showToast('내일 투두를 생성했어요!');
  } catch { showToast('AI 생성 실패','err'); }
  btn.disabled=false; btn.textContent='✨ 내일 투두 생성';
}

loadLocal();
renderToday();
</script>
